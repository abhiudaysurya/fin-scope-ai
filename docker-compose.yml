# ─────────────────────────────────────────────────
# FinScope AI - Docker Compose (API + PostgreSQL)
# ─────────────────────────────────────────────────

services:
  # ── PostgreSQL Database ──
  db:
    image: postgres:16-alpine
    container_name: finscope-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finscope}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finscope_secret}
      POSTGRES_DB: ${POSTGRES_DB:-finscope_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finscope} -d ${POSTGRES_DB:-finscope_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - finscope-net

  # ── FinScope AI API ──
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finscope-api
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-finscope}:${POSTGRES_PASSWORD:-finscope_secret}@db:5432/${POSTGRES_DB:-finscope_db}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-finscope}:${POSTGRES_PASSWORD:-finscope_secret}@db:5432/${POSTGRES_DB:-finscope_db}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MODEL_PATH: /app/models/artifacts
    volumes:
      - ./models/artifacts:/app/models/artifacts:ro
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - finscope-net

volumes:
  postgres_data:
    driver: local

networks:
  finscope-net:
    driver: bridge
